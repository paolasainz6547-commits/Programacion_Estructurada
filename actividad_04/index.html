<head>

<title>Actividad 04 · Estructuras Cíclicas · Paola Sainz</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

<style>
  :root {
    --bg:       #f5f5f3;
    --surface:  #ffffff;
    --border:   #e4e4e0;
    --border2:  #d0d0cc;
    --accent:   #2d6a4f;
    --accent-bg:#eaf2ee;
    --text:     #1a1a18;
    --muted:    #888884;
    --tag-bg:   #2d6a4f;
    --tag-text: #ffffff;
    --num:      #ebebea;
    --tab-active-bg: #2d6a4f;
    --tab-active-text: #fff;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: .85rem 2rem;
    gap: 1rem;
  }
  .topbar-left { display: flex; align-items: center; gap: .75rem; }
  .back-link {
    display: flex; align-items: center; gap: .4rem;
    color: var(--muted); text-decoration: none;
    font-size: .78rem; letter-spacing: .06em; text-transform: uppercase;
    transition: color .18s;
  }
  .back-link:hover { color: var(--accent); }
  .sep { color: var(--border2); font-size: .9rem; }
  .crumb { font-size: .82rem; color: var(--text); font-weight: 500; }
  .gh-btn {
    display: flex; align-items: center; gap: .4rem;
    text-decoration: none; color: var(--muted);
    font-size: .78rem; padding: .38rem .9rem;
    border: 1px solid var(--border2); border-radius: 6px;
    transition: all .18s;
  }
  .gh-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

  /* ── HERO ── */
  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    position: relative; overflow: hidden;
  }
  .hero-watermark {
    position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%);
    font-size: clamp(4rem, 10vw, 8rem);
    font-weight: 700; color: var(--num);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1; pointer-events: none; user-select: none;
    letter-spacing: -.04em;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: .35rem;
    background: var(--tag-bg); color: var(--tag-text);
    font-size: .68rem; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; padding: .22rem .65rem; border-radius: 4px;
    margin-bottom: .9rem;
  }
  .hero h1 {
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    font-weight: 600; line-height: 1.15;
    letter-spacing: -.02em; margin-bottom: .4rem;
    color: var(--text);
  }
  .hero-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem; color: var(--muted);
  }

  /* ── TABS ── */
  .tabs-bar {
    display: flex; align-items: center; gap: .3rem;
    padding: .75rem 2rem; background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem; padding: .3rem .75rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--muted); border-radius: 5px;
    cursor: pointer; transition: all .15s;
  }
  .tab:hover { color: var(--text); border-color: #aaa; }
  .tab.active {
    background: var(--tab-active-bg);
    border-color: var(--tab-active-bg);
    color: var(--tab-active-text);
    font-weight: 600;
  }

  /* ── CODE AREA ── */
  .code-section { flex: 1; display: flex; flex-direction: column; }
  .code-wrapper { flex: 1; }

  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .55rem 1.5rem;
    background: #f0f0ee;
    border-bottom: 1px solid var(--border);
  }
  .code-filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem; color: var(--muted);
    display: flex; align-items: center; gap: .5rem;
  }
  .dot { width:9px; height:9px; border-radius:2px; background: var(--accent); display:inline-block; }
  .copy-btn {
    display: flex; align-items: center; gap: .35rem;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: .72rem; padding: .28rem .7rem;
    border-radius: 5px; cursor: pointer; transition: all .15s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.ok { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

  /* Override highlight.js to match light theme */
  pre { margin:0 !important; border-radius:0 !important; }
  pre code.hljs {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: .84rem !important;
    line-height: 1.65 !important;
    padding: 1.75rem 2rem !important;
    background: #fafaf8 !important;
    color: #24292e !important;
  }

  /* ── LOADING / ERROR ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: .6rem; padding: 4rem 2rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: .82rem;
  }
  .ld { width:5px; height:5px; border-radius:50%; background: var(--accent); animation: blink 1.1s ease-in-out infinite; }
  .ld:nth-child(2){ animation-delay:.18s } .ld:nth-child(3){ animation-delay:.36s }
  @keyframes blink { 0%,100%{opacity:.15} 50%{opacity:1} }
  .err { padding: 2rem; font-family: 'JetBrains Mono', monospace; font-size:.82rem; color:#c0392b; }

  /* ── BOTTOM NAV ── */
  .page-nav {
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 2rem; gap: 1rem;
  }
  .nav-btn {
    text-decoration: none; font-size: .82rem; color: var(--muted);
    transition: color .18s; display: flex; align-items: center; gap: .3rem;
  }
  .nav-btn:hover { color: var(--accent); }
  .nav-center { font-size: .8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a href="../" class="back-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Portafolio
    </a>
    <span class="sep">/</span>
    <span class="crumb">Estructuras Cíclicas</span>
  </div>
  <a href="https://github.com/paolasainz6547-commits/Programacion_Estructurada/tree/main/Actividad%2004_Ciclos/Codigo" target="_blank" class="gh-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.92.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
    Ver en GitHub
  </a>
</header>

<section class="hero">
  <div class="hero-watermark">04</div>
  <div class="hero-tag">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Actividad 04
  </div>
  <h1>Estructuras Cíclicas</h1>
  <p class="hero-sub">for / while / do while</p>
</section>

<div class="code-section">
  <div class="tabs-bar">
    <button class="tab active" data-file="calculadora_de_promedio.c" onclick="loadFile(this)">calculadora_de_promedio.c</button>
<button class="tab " data-file="do while.c" onclick="loadFile(this)">do while.c</button>
<button class="tab " data-file="for.c" onclick="loadFile(this)">for.c</button>
<button class="tab " data-file="while.c" onclick="loadFile(this)">while.c</button>
  </div>
  <div class="code-wrapper" id="codeWrapper">
    <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div><span>Cargando código...</span></div>
  </div>
</div>

<nav class="page-nav">
  <a href="../actividad_03/" class="nav-btn">← Anterior</a>
  <span class="nav-center">actividad 04 / 12</span>

</nav>

<script>
const FILES = {
  "calculadora_de_promedio.c": "https://raw.githubusercontent.com/paolasainz6547-commits/Programacion_Estructurada/main/Actividad%2004_Ciclos/Codigo/calculadora_de_promedio.c",
  "do while.c": "https://raw.githubusercontent.com/paolasainz6547-commits/Programacion_Estructurada/main/Actividad%2004_Ciclos/Codigo/do%20while.c",
  "for.c": "https://raw.githubusercontent.com/paolasainz6547-commits/Programacion_Estructurada/main/Actividad%2004_Ciclos/Codigo/for.c",
  "while.c": "https://raw.githubusercontent.com/paolasainz6547-commits/Programacion_Estructurada/main/Actividad%2004_Ciclos/Codigo/while.c",
};
let currentCode = '';

async function loadFile(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const fn = btn.dataset.file;
  const url = FILES[fn];
  const w = document.getElementById('codeWrapper');
  w.innerHTML = `<div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div><span>Cargando ${fn}...</span></div>`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error();
    const code = await r.text();
    currentCode = code;
    const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    w.innerHTML = `
      <div class="code-header">
        <span class="code-filename"><span class="dot"></span>${fn}</span>
        <button class="copy-btn" id="cpBtn" onclick="doCopy()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar
        </button>
      </div>
      <pre><code class="language-c">${esc}</code></pre>`;
    hljs.highlightAll();
  } catch(e) {
    w.innerHTML = `<div class="err">⚠ No se pudo cargar el archivo.<br><small style="opacity:.6">${url}</small></div>`;
  }
}

function doCopy() {
  navigator.clipboard.writeText(currentCode).then(() => {
    const b = document.getElementById('cpBtn');
    b.textContent = '✓ Copiado'; b.classList.add('ok');
    setTimeout(() => { b.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar`; b.classList.remove('ok'); }, 2000);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const first = document.querySelector('.tab.active');
  if (first) loadFile(first);
});
</script>
</body>
